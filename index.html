<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>My Wife ❤️</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  background: linear-gradient(#ff9a9e, #fad0c4);
  margin: 0;
}

.box {
  background: white;
  padding: 20px;
  margin: 20px auto;
  width: 320px;
  border-radius: 15px;
}

button {
  padding: 10px;
  border: none;
  background: pink;
  cursor: pointer;
  border-radius: 10px;
}

textarea {
  width: 90%;
  height: 100px;
}

.hidden { display:none; }

.heart {
  position: fixed;
  top: -10px;
  animation: fall 5s linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}
</style>

</head>

<body>
<audio id="Dahsyat" loop>
  <source src="Dahsyat.mp3" type="audio/mpeg">
</audio>
<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>💖 Welcome My Love 💖</h2>
  <input type="password" id="pass" placeholder="Password"><br><br>
  <button onclick="login()">Masuk</button>
  <p id="msg" style="color:red;"></p>
</div>

<!-- HALAMAN UTAMA -->
<div class="hidden" id="home">

  <p>
Website ini aku buat khusus untuk dede (Karisa Fadlina) ❤️<br>
Pokoknya simpen aja semua kesedihan, kebahagiaan,dan cinta dede dan kaka disini.<br>
Semoga setiap dede buka ini, dede selalu merasa dicintai 💖
</p>

  <h1>Untuk Istriku ❤️</h1>

  <!-- FOTO -->
  <img src="karisa.jpg" width="200" style="border-radius:15px;">

  <!-- SURAT INPUT -->
  <div class="box">
    <h3>💌 Tulis Pesan Cinta</h3>
    <textarea id="loveText" placeholder="Tulis pesan di sini..."></textarea><br>
    <button onclick="simpan()">Simpan</button>
    <p id="hasil"></p>
  </div>

  <!-- KEJUTAN -->
  <div class="box">
    <h3>🎁 Kejutan Untukmu</h3>
    <button onclick="surprise()">Buka Kejutan ❤️</button>
  </div>

</div>

<script>
let password = "kaka selalu sayang dede";

// LOGIN
function login() {
  let input = document.getElementById("pass").value;

  if (input === password) {
    document.getElementById("loginBox").style.display="none";
    document.getElementById("home").classList.remove("hidden");
    startHearts();
    cekTanggal();
    loadPesan();
    document.getElementById("Dahsyat").play();
  } else {
    document.getElementById("msg").innerHTML="Password salah 💔";
  }
}

// SIMPAN PESAN (localStorage)
function simpan() {
  let text = document.getElementById("loveText").value;
  localStorage.setItem("pesanCinta", text);
  document.getElementById("hasil").innerHTML = "Tersimpan ❤️";
}

// LOAD PESAN
function loadPesan() {
  let text = localStorage.getItem("pesanCinta");
  if (text) {
    document.getElementById("loveText").value = text;
  }
}

// EFEK HATI
function startHearts() {
  setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random()*100 + "vw";
    heart.style.fontSize = (10 + Math.random()*20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }, 300);
}

// KEJUTAN RANDOM
function surprise() {
  let box = document.createElement("div");
  box.innerHTML = "💖 KAKA SAYANG DEDE 💖";
  box.style.position = "fixed";
  box.style.top = "40%";
  box.style.left = "50%";
  box.style.transform = "translate(-50%, -50%)";
  box.style.background = "white";
  box.style.padding = "30px";
  box.style.borderRadius = "20px";
  box.style.fontSize = "20px";
  box.style.boxShadow = "0 0 20px pink";

  document.body.appendChild(box);

  setTimeout(() => box.remove(), 3000);
}

  let random = pesan[Math.floor(Math.random()*pesan.length)];
  alert(random);
}

// KEJUTAN TANGGAL 9
function cekTanggal() {
  let today = new Date();

  if (today.getDate() == 9) {
    setTimeout(() => {
      surprise();
    }, 2000);
  }
}
</script>

</body>
</html>
