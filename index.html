<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Dede 💖</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff9a9e, #fad0c4);
  color: #fff;
}

.box {
  background: rgba(255,255,255,0.2);
  margin: 15px;
  padding: 15px;
  border-radius: 15px;
}

input, textarea, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 80%;
  margin: 5px;
}

button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

#main {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>💖 Login Dulu Ya Dede 💖</h2>

  <input id="email" placeholder="Email"><br>
  <input id="passwordLogin" type="password" placeholder="Password"><br>

  <button onclick="daftar()">Daftar</button>
  <button onclick="masuk()">Masuk</button>
</div>

<!-- MAIN -->
<div id="main">

<div class="box">
  <h2>💌 Untuk Dede Tercinta</h2>
  <p id="welcomeText"></p>
</div>

<!-- MUSIK -->
<audio id="music" loop>
  <source src="Dahsyat.mp3" type="audio/mpeg">
</audio>
<button onclick="document.getElementById('music').play()">▶️ Putar Musik</button>

<!-- KOMENTAR -->
<div class="box">
  <h3>💬 Cerita Kita</h3>
  <textarea id="komentar" placeholder="Tulis sesuatu untuk dede..."></textarea>
  <br>
  <button onclick="kirimKomentar()">Kirim</button>
  <div id="listKomentar"></div>
</div>

<!-- GAME -->
<div class="box">
  <h3>💗 Tangkap Hati Dede</h3>
  <p>Waktu: <span id="timer">10</span></p>
  <p>Skor: <span id="score">0</span></p>
  <button onclick="mulaiGame()">Mulai Game</button>
  <div id="areaGame" style="height:200px; position:relative;"></div>
</div>

<!-- LEADERBOARD -->
<div class="box">
  <h3>🏆 Leaderboard Cinta</h3>
  <button onclick="simpanSkor()">Simpan Skor</button>
  <div id="leaderboard"></div>
</div>

</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

// 🔥 CONFIG (ISI PUNYA KAMU)
const firebaseConfig = { apiKey: "AIzaSyCf_wZGW9TrOot5GBEW4EcIo5u7BY4g474", authDomain: "my-wife-one-only.firebaseapp.com", databaseURL: "https://my-wife-one-only-default-rtdb.asia-southeast1.firebasedatabase.app", projectId: "my-wife-one-only", storageBucket: "my-wife-one-only.firebasestorage.app", messagingSenderId: "520852731004", appId: "1:520852731004:web:96afc608002d47d83905f9", measurementId: "G-F5J0MZYN3W" };

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

// DAFTAR
function daftar() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("passwordLogin").value;

  if (!email || !pass) return alert("Isi semua dulu ❤️");

  auth.createUserWithEmailAndPassword(email, pass)
    .then(() => alert("Berhasil daftar ❤️"))
    .catch(err => alert(err.message));
}

// LOGIN
function masuk() {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("passwordLogin").value;

  auth.signInWithEmailAndPassword(email, pass)
    .catch(err => alert(err.message));
}

// AUTO LOGIN + SIMPAN NAMA SEKALI
auth.onAuthStateChanged(user => {
  if (user) {
    let uid = user.uid;

    db.ref("users/" + uid).once("value", snap => {
      if (!snap.exists()) {
        let nama = prompt("Masukkan nama kamu ❤️");
        if (!nama) nama = "Dede 💖";

        db.ref("users/" + uid).set({
          nama: nama
        });
      }

      tampilkanUser(uid);
    });

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("main").style.display = "block";
  }
});

// TAMPILKAN USER
function tampilkanUser(uid) {
  db.ref("users/" + uid).once("value", snap => {
    let nama = snap.val().nama;

    document.getElementById("welcomeText").innerHTML =
      `Hai ${nama}... 💖<br>Kaka sayang sama dede selamanya 😊`;
  });
}

// KOMENTAR
function kirimKomentar() {
  let user = auth.currentUser;
  let komentar = document.getElementById("komentar").value;

  if (!user) return alert("Login dulu ❤️");
  if (!komentar) return alert("Tulis dulu ya ❤️");

  let uid = user.uid;

  db.ref("users/" + uid).once("value", snap => {
    let nama = snap.val().nama;

    db.ref("komentar").push({
      uid: uid,
      nama: nama,
      komentar: komentar
    });

    document.getElementById("komentar").value = "";
  });
}

// LOAD KOMENTAR
db.ref("komentar").on("value", snapshot => {
  let data = snapshot.val();
  let html = "";

  for (let id in data) {
    html += `<p><b>${data[id].nama}</b>: ${data[id].komentar}</p>`;
  }

  document.getElementById("listKomentar").innerHTML = html;
});

// GAME
let skor = 0;
let waktu = 10;
let gameAktif = false;

function mulaiGame() {
  skor = 0;
  waktu = 10;
  gameAktif = true;

  document.getElementById("score").innerText = skor;
  document.getElementById("timer").innerText = waktu;

  spawnHati();

  let countdown = setInterval(() => {
    waktu--;
    document.getElementById("timer").innerText = waktu;

    if (waktu <= 0) {
      clearInterval(countdown);
      gameAktif = false;
      alert("Skor kaka: " + skor);
    }
  }, 1000);
}

function spawnHati() {
  if (!gameAktif) return;

  let area = document.getElementById("areaGame");

  let hati = document.createElement("div");
  hati.innerHTML = "💖";

  hati.style.position = "absolute";
  hati.style.left = Math.random() * 90 + "%";
  hati.style.top = Math.random() * 80 + "%";
  hati.style.fontSize = "30px";

  hati.onclick = function() {
    skor++;
    document.getElementById("score").innerText = skor;
    hati.remove();
  };

  area.appendChild(hati);

  setTimeout(() => {
    hati.remove();
    spawnHati();
  }, 800);
}

// LEADERBOARD
function simpanSkor() {
  let user = auth.currentUser;
  if (!user) return alert("Login dulu ❤️");

  let uid = user.uid;

  db.ref("users/" + uid).once("value", snap => {
    let nama = snap.val().nama;

    db.ref("leaderboard/" + uid).set({
      nama: nama,
      skor: skor
    });
  });
}

// LOAD LEADERBOARD
db.ref("leaderboard").on("value", snapshot => {
  let data = snapshot.val();
  let arr = [];

  for (let id in data) {
    arr.push(data[id]);
  }

  arr.sort((a,b)=>b.skor-a.skor);

  let html = "";
  arr.forEach((item,i)=>{
    html += `<p>${i+1}. ❤️ ${item.nama} - ${item.skor}</p>`;
  });

  document.getElementById("leaderboard").innerHTML = html;
});

</script>

</body>
</html>
