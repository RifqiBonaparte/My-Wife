<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Dede 💖</title>

<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
  background-size: 400% 400%;
  animation: bgAnim 10s infinite alternate;
  color: #fff;
}

@keyframes bgAnim {
  0% {background-position: left;}
  100% {background-position: right;}
}

.box {
  background: rgba(255,255,255,0.2);
  margin: 15px;
  padding: 15px;
  border-radius: 20px;
  backdrop-filter: blur(10px);
}

input, textarea, button {
  padding: 10px;
  border-radius: 10px;
  border: none;
  width: 80%;
  margin: 5px;
}

button {
  background: #ff4d6d;
  color: white;
  cursor: pointer;
}

/* CHAT SCROLL */
.chat {
  display: flex;
  flex-direction: column;
  max-height: 250px;
  overflow-y: auto;
  padding: 10px;
}

/* BUBBLE */
.bubble {
  max-width: 70%;
  padding: 10px;
  margin: 5px;
  border-radius: 15px;
  text-align: left;
  position: relative;
}

.me {
  background: #ff4d6d;
  align-self: flex-end;
}

.other {
  background: rgba(255,255,255,0.5);
  color: #000;
}

/* ACTION BUTTON */
.action {
  font-size: 12px;
  margin-top: 5px;
}

/* PROFILE */
.profile-box {
  text-align: left;
}

.profile-box input, .profile-box textarea {
  width: 95%;
}

/* LOVE */
.love {
  position: fixed;
  top: -10px;
  font-size: 20px;
  animation: fall linear infinite;
}

@keyframes fall {
  to { transform: translateY(100vh); }
}

#main { display: none; }

</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h2>💖 Login Dulu Ya Dede 💖</h2>
  <input id="email" placeholder="Email"><br>
  <input id="passwordLogin" type="password" placeholder="Password"><br>
  <button onclick="daftar()">Daftar</button>
  <button onclick="masuk()">Masuk</button>
</div>

<!-- MAIN -->
<div id="main">

<!-- COUNTDOWN -->
<div class="box">
  <h3>💖 Menuju Hari Kita 💖</h3>
  <p id="countdownText">Menghitung...</p>
</div>

<!-- PROFIL -->
<div class="box profile-box">
  <h3>👤 Profil Dede</h3>
  <input id="namaProfil"><br>
  <textarea id="bioProfil"></textarea><br>
  <button onclick="simpanProfil()">💾 Simpan Profil</button>
</div>

<div class="box">
  <h2>💌 Untuk Dede Tercinta</h2>
  <p id="welcomeText"></p>
</div>

<!-- KOMENTAR -->
<div class="box">
  <h3>💬 Cerita Kita</h3>
  <textarea id="komentar"></textarea>
  <button onclick="kirimKomentar()">Kirim</button>
  <div id="listKomentar" class="chat"></div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  databaseURL: "ISI"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const auth = firebase.auth();

// LOGIN
function daftar(){
  auth.createUserWithEmailAndPassword(email.value, passwordLogin.value);
}

function masuk(){
  auth.signInWithEmailAndPassword(email.value, passwordLogin.value);
}

// AUTO LOGIN
auth.onAuthStateChanged(user=>{
  if(user){
    let uid=user.uid;

    db.ref("users/"+uid).once("value",snap=>{
      if(!snap.exists()){
        db.ref("users/"+uid).set({nama:"Dede 💖"});
      }
      tampilkanUser(uid);
    });

    loginBox.style.display="none";
    main.style.display="block";
  }
});

// KOMENTAR
function kirimKomentar(){
  let u=auth.currentUser;

  db.ref("users/"+u.uid).once("value",snap=>{
    db.ref("komentar").push({
      uid:u.uid,
      nama:snap.val().nama,
      komentar:komentar.value
    });
  });

  komentar.value="";
}

// LOAD KOMENTAR + EDIT + DELETE
db.ref("komentar").on("value",snap=>{
  let data=snap.val();
  let html="";
  let user=auth.currentUser;

  for(let id in data){
    let isMe = user && data[id].uid===user.uid;

    html += `
    <div class="bubble ${isMe?"me":"other"}">
      <b>${data[id].nama}</b><br>
      <span id="text-${id}">${data[id].komentar}</span>
      ${isMe ? `
        <div class="action">
          <button onclick="editKomentar('${id}')">✏️</button>
          <button onclick="hapusKomentar('${id}')">🗑️</button>
        </div>
      ` : ""}
    </div>`;
  }

  listKomentar.innerHTML=html;
});

// EDIT
function editKomentar(id){
  let text = document.getElementById("text-"+id).innerText;
  let baru = prompt("Edit pesan:", text);
  if(baru){
    db.ref("komentar/"+id).update({
      komentar: baru
    });
  }
}

// DELETE
function hapusKomentar(id){
  if(confirm("Hapus pesan?")){
    db.ref("komentar/"+id).remove();
  }
}

// COUNTDOWN
function updateCountdown(){
  let now=new Date();
  let target=new Date();
  target.setDate(9);

  if(now.getDate()>9){
    target.setMonth(target.getMonth()+1);
  }

  let diff=target-now;
  let d=Math.floor(diff/86400000);

  countdownText.innerHTML = d+" hari lagi 💖";
}

setInterval(updateCountdown,1000);
updateCountdown();

</script>

</body>
</html>
